x-environment-vars: &environment-vars
  POSTGRES_HOST: postgres
  DATABASE_URL: postgresql://open_event_user:opev_pass@postgres:5432/open_event
  REDIS_URL: redis://redis:6379/0
  ADMIN_EMAIL: "@{ADMIN_EMAIL}"
  ADMIN_PASSWORD: "@{ADMIN_PASSWORD}"
  # Inside the Docker network the mock is reachable by service name, not localhost
  KHSC_API_URL: http://khsc-mock:9090/api/index.php

x-defaults: &defaults
  build: .
  platform: linux/amd64
  image: eventyay/open-event-server:development
  restart: unless-stopped
  env_file:
    - .env
  environment:
    <<: *environment-vars
  depends_on:
    - postgres
    - redis
  volumes:
    - ./app:/data/app/app
    - ./migrations:/data/app/migrations
    - ./static:/data/app/static
    - ./generated:/data/app/generated # Workaround for #6155
    - ./marshmallow_jsonapi_schema.py:/opt/pysetup/.venv/lib/python3.8/site-packages/marshmallow_jsonapi/schema.py:ro

services:
  postgres:
    image: postgis/postgis:12-3.0-alpine
    platform: linux/amd64
    container_name: opev-postgres
    restart: unless-stopped
    volumes:
      - pg:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: open_event_user
      POSTGRES_PASSWORD: opev_pass
      POSTGRES_DB: open_event

  redis:
    image: redis:3-alpine
    platform: linux/amd64
    container_name: opev-redis
    restart: unless-stopped
    command: redis-server
    volumes:
      - rd:/var/lib/redis/data

  web:
    <<: *defaults
    container_name: opev-web
    ports:
      - 8080:8080
    depends_on:
      - postgres
      - redis
      - khsc-mock

  celery:
    <<: *defaults
    container_name: opev-celery
    depends_on:
      - web
    environment:
      <<: *environment-vars
      C_FORCE_ROOT: "true"
    command: celery

  khsc-mock:
    build: ./khsc_mock
    container_name: opev-khsc-mock
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - ./khsc_mock/delegates.json:/app/delegates.json

volumes:
    pg:
    rd:
